apiVersion: v1
kind: Secret
metadata:
  name: repforge-secrets
  namespace: repforge
type: Opaque
stringData:
  # Get this from Azure Portal > ironforge-cosmos > Connection strings > Primary MongoDB Connection String
  # Append /repforge?ssl=true&replicaSet=globaldb&retrywrites=false&maxIdleTimeMS=120000 before the ?
  ConnectionStrings__MongoDB: "mongodb://ironforge-cosmos:<PRIMARY_KEY>@ironforge-cosmos.mongo.cosmos.azure.com:10255/repforge?ssl=true&replicaSet=globaldb&retrywrites=false&maxIdleTimeMS=120000"
  Tokens__JwtKey: replace-with-at-least-32-random-characters
  ElevenLabs__ApiKey: sk_replace-with-your-elevenlabs-api-key
