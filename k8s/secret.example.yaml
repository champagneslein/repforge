apiVersion: v1
kind: Secret
metadata:
  name: repforge-secrets
  namespace: repforge
type: Opaque
stringData:
  ConnectionStrings__DefaultConnection: Server=tcp:<azure-sql-server>.database.windows.net,1433;Initial Catalog=repforge;Persist Security Info=False;User ID=<user>;Password=<password>;MultipleActiveResultSets=False;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;
  Tokens__JwtKey: replace-with-at-least-32-random-characters
