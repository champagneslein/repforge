apiVersion: batch/v1
kind: Job
metadata:
  name: repforge-db-bootstrap
  namespace: repforge
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: db-bootstrap
          image: ironforge.azurecr.io/repforge-backend:latest
          imagePullPolicy: IfNotPresent
          args:
            - --ensure-db
          envFrom:
            - configMapRef:
                name: repforge-config
            - secretRef:
                name: repforge-secrets
