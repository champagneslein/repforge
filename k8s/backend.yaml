apiVersion: apps/v1
kind: Deployment
metadata:
  name: repforge-backend
  namespace: repforge
  labels:
    app: repforge-backend
spec:
  replicas: 1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: repforge-backend
  template:
    metadata:
      labels:
        app: repforge-backend
    spec:
      containers:
        - name: backend
          image: ironforge.azurecr.io/repforge-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: repforge-config
            - secretRef:
                name: repforge-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: repforge-backend
  namespace: repforge
spec:
  type: ClusterIP
  selector:
    app: repforge-backend
  ports:
    - name: http
      port: 80
      targetPort: 8080
