apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: repforge
  namespace: repforge
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: webapprouting.kubernetes.azure.com
  tls:
    - secretName: repforge-tls
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: repforge-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: repforge-frontend
                port:
                  number: 80
