apiVersion: apps/v1
kind: Deployment
metadata:
  name: repforge-frontend
  namespace: repforge
  labels:
    app: repforge-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: repforge-frontend
  template:
    metadata:
      labels:
        app: repforge-frontend
    spec:
      containers:
        - name: frontend
          image: ironforge.azurecr.io/repforge-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: repforge-frontend
  namespace: repforge
spec:
  type: ClusterIP
  selector:
    app: repforge-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
