name: Build and deploy to AKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AZURE_CLIENT_ID: bbc60a91-7a8d-4b18-81c5-3a723128ebd3
  AZURE_TENANT_ID: 5788f938-088f-4004-83c2-73ce9e724e16
  AZURE_SUBSCRIPTION_ID: e3eee9a1-a70b-4189-a127-ab39a912fb5f
  RESOURCE_GROUP: Ironforge
  AKS_CLUSTER_NAME: Ironforge-Test
  ACR_NAME: Ironforge
  ACR_LOGIN_SERVER: ironforge.azurecr.io
  K8S_NAMESPACE: repforge

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build backend
        run: dotnet build src/SharpenedIron/SharpenedIron.csproj --configuration Release

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Build frontend
        run: |
          npm ci
          npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push images
        run: |
          az acr login --name "$ACR_NAME"
          docker build -f Dockerfile.frontend \
            -t "$ACR_LOGIN_SERVER/repforge-frontend:${GITHUB_SHA}" \
            -t "$ACR_LOGIN_SERVER/repforge-frontend:latest" .
          docker build -f Dockerfile.backend \
            -t "$ACR_LOGIN_SERVER/repforge-backend:${GITHUB_SHA}" \
            -t "$ACR_LOGIN_SERVER/repforge-backend:latest" .
          docker push "$ACR_LOGIN_SERVER/repforge-frontend:${GITHUB_SHA}"
          docker push "$ACR_LOGIN_SERVER/repforge-frontend:latest"
          docker push "$ACR_LOGIN_SERVER/repforge-backend:${GITHUB_SHA}"
          docker push "$ACR_LOGIN_SERVER/repforge-backend:latest"

      - name: Configure kubectl
        run: az aks get-credentials --resource-group "$RESOURCE_GROUP" --name "$AKS_CLUSTER_NAME" --admin --overwrite-existing

      - name: Verify runtime secret exists
        run: kubectl get secret repforge-secrets --namespace "$K8S_NAMESPACE"

      - name: Deploy manifests
        run: |
          kubectl apply -k k8s
          kubectl set image deployment/repforge-frontend frontend="$ACR_LOGIN_SERVER/repforge-frontend:${GITHUB_SHA}" --namespace "$K8S_NAMESPACE"
          kubectl set image deployment/repforge-backend backend="$ACR_LOGIN_SERVER/repforge-backend:${GITHUB_SHA}" --namespace "$K8S_NAMESPACE"

      - name: Bootstrap database schema
        run: |
          kubectl delete job repforge-db-bootstrap --namespace "$K8S_NAMESPACE" --ignore-not-found
          kubectl apply -f k8s/db-bootstrap-job.yaml
          kubectl set image job/repforge-db-bootstrap db-bootstrap="$ACR_LOGIN_SERVER/repforge-backend:${GITHUB_SHA}" --namespace "$K8S_NAMESPACE"
          kubectl wait --for=condition=complete job/repforge-db-bootstrap --namespace "$K8S_NAMESPACE" --timeout=180s

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/repforge-frontend --namespace "$K8S_NAMESPACE" --timeout=180s
          kubectl rollout status deployment/repforge-backend --namespace "$K8S_NAMESPACE" --timeout=180s
